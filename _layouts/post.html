<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
      :root {
        color-scheme: dark;
        --background: #162230;
        --card: #1d2a39;
        --muted: #9aa7b5;
        --text: #f0f4f8;
        --border: #334155;
        --primary: #f97316;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: var(--background);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.7;
      }

      a { color: var(--primary); text-decoration: none; }
      a:hover { text-decoration: underline; }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid rgba(148, 163, 184, 0.25);
        background: rgba(22, 34, 48, 0.94);
        backdrop-filter: blur(14px);
      }

      .nav {
        max-width: 1120px;
        margin: 0 auto;
        min-height: 64px;
        padding: 0 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--text);
        font-weight: 800;
        letter-spacing: 0;
      }

      .brand-mark {
        display: inline-grid;
        place-items: center;
        width: 28px;
        height: 28px;
        border: 1px solid var(--border);
        border-radius: 7px;
        color: var(--primary);
        font-weight: 900;
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 18px;
        font-size: 14px;
      }

      .nav-links a { color: var(--muted); }
      .nav-links a:hover { color: var(--text); text-decoration: none; }

      main {
        max-width: 820px;
        margin: 0 auto;
        padding: 56px 20px 72px;
      }

      .post-back {
        display: inline-flex;
        align-items: center;
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 28px;
      }

      .post-meta {
        color: var(--primary);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 12px;
      }

      h1 {
        font-size: clamp(36px, 6vw, 58px);
        line-height: 1.03;
        margin: 0 0 18px;
        letter-spacing: 0;
      }

      .description {
        color: var(--muted);
        font-size: 19px;
        margin: 0 0 38px;
      }

      .post-content h2 {
        font-size: 30px;
        line-height: 1.15;
        margin: 44px 0 14px;
      }

      .post-content h3 {
        font-size: 21px;
        line-height: 1.25;
        margin: 32px 0 10px;
      }

      .post-content p,
      .post-content li {
        color: #d7dee7;
        font-size: 17px;
      }

      .post-content img {
        width: 100%;
        height: auto;
        border-radius: 10px;
        border: 1px solid var(--border);
        margin: 24px 0 4px;
      }

      .post-content blockquote,
      .post-cta {
        margin: 34px 0;
        padding: 22px;
        border: 1px solid rgba(249, 115, 22, 0.45);
        border-radius: 10px;
        background: rgba(249, 115, 22, 0.08);
      }

      .post-content hr {
        border: 0;
        border-top: 1px solid var(--border);
        margin: 36px 0;
      }

      .post-footer {
        margin-top: 52px;
        padding-top: 28px;
        border-top: 1px solid var(--border);
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        justify-content: space-between;
        color: var(--muted);
        font-size: 14px;
      }

      .button {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        border-radius: 8px;
        background: var(--primary);
        color: #1a120b;
        font-weight: 800;
      }

      .button:hover { text-decoration: none; background: #fb8a35; }

      @media (max-width: 640px) {
        .nav { align-items: flex-start; flex-direction: column; padding: 14px 20px; }
        .nav-links { flex-wrap: wrap; gap: 12px; }
        main { padding-top: 36px; }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <nav class="nav" aria-label="Primary navigation">
        <a href="/" class="brand"><span class="brand-mark">F</span> Field Crew AI</a>
        <div class="nav-links">
          <a href="/blog">Resources</a>
          <a href="/#resources">Checklist</a>
          <a href="/#assessment">Assessment</a>
          <a href="/#contact">Contact</a>
        </div>
      </nav>
    </header>

    <main>
      <a class="post-back" href="/blog">&larr; Back to Resources</a>
      <article>
        <div class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</div>
        <h1>{{ page.title }}</h1>
        {% if page.description %}
          <p class="description">{{ page.description }}</p>
        {% endif %}
        <div class="post-content">
          {{ content }}
        </div>
      </article>
      <div class="post-footer">
        <span>Field Crew AI</span>
        <a class="button" href="/#resources">Get the checklist</a>
      </div>
    </main>
  </body>
</html>
